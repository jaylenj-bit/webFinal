<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold Call options</title>
  <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Some tips</h1>
  <input type="number" id="numInput" placeholder="Enter number">
<button onclick="getTips()">Submit</button>
<p id="output"></p>
<script>
function getTips() {
    var num = document.getElementById("numInput").value;
    num = parseInt(num);

    var tips = ["Identify The Problem", "Stay Disciplined", "Love what you do", "Don't give up", "Listen to others that've been doing it longer"];

    if (num > tips.length || num <= 0 || isNaN(num)) {
        document.getElementById("output").innerHTML = "Please enter a valid number.";
    } else {
        var text = "Number of tips shown: " + num + "<ul>";

        for (var i = 0; i < num; i++) {
            text += "<li>" + tips[i] + "</li>";
        }

        text += "</ul>";

        document.getElementById("output").innerHTML = text;
    }
}
</script>
    <footer>
        <p>© 2026 How to Sell Website</p>
    </footer>

</body>
</html>
